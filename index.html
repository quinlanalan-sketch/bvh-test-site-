<!DOCTYPE html>
<html>
  <body>
    <h2>Data from Apps Script:</h2>
    <pre id="output">Loading…</pre>

    <script>
      fetch("YOUR_WEB_APP_URL_HERE")
        .then(response => response.json())
        .then(data => {
          document.getElementById("output").textContent =
            JSON.stringify(data, null, 2);
        })
        .catch(err => {
          document.getElementById("output").textContent =
            "Error: " + err;
        });
    </script>
  </body>
</html>
