<!DOCTYPE html>
<html>
  <body>
    <h2>Data from Apps Script:</h2>
    <pre id="output">Loading…</pre>

    <script>
      fetch("https://script.google.com/macros/s/AKfycbzCvF-nn1cFLEHpdEuM-VArf0v8dszreWinMzp6gBe8RT9xdl4JMq5aQSIab2xgUZuBWw/exec?api=test")
        .then(response => response.json())
        .then(data => {
          document.getElementById("output").textContent =
            JSON.stringify(data, null, 2);
        })
        .catch(err => {
          document.getElementById("output").textContent =
            "Error: " + err;
        });
    </script>
  </body>
</html>
