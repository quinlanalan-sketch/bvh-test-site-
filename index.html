<!DOCTYPE html>
<html>
  <body>
    <h2>Data from Apps Script:</h2>
    <pre id="output">Loading…</pre>

    <script>
      fetch("https://script.google.com/macros/s/AKfycbzSZURxELFnlM3_spFF3BOjHbN5B5Mn_f1EMEcDQS4UHwoUd-Qq0RuVesx03k3g7O7mOA/exec")
        .then(response => response.json())
        .then(data => {
          document.getElementById("output").textContent =
            JSON.stringify(data, null, 2);
        })
        .catch(err => {
          document.getElementById("output").textContent =
            "Error: " + err;
        });
    </script>
  </body>
</html>
